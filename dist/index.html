<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager & Study Coach</title>
  <script type="module" crossorigin src="/assets/index-DsroMzQF.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CDfQ6Hfq.css">
</head>
<body>
    <main class="container">
        <h1>Task Manager</h1>

        <!-- Task Manager Section -->
        <section>
            <form id="task-form">
                <label for="task-input">New task</label>
                <div class="input-row">
                    <input type="text" id="task-input" placeholder="Enter a task..." required />
                    <button type="submit">Add Task</button>
                </div>
                <p id="form-error" class="error"></p>
            </form>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="task-list"></ul>

            <div class="task-stats">
                <span id="task-count">0 tasks</span>
                <button id="clear-completed" class="secondary">Clear Completed</button>
            </div>
        </section>

        <!-- ===== NEW: AI STUDY COACH SECTION ===== -->
        <section class="study-coach">
            <h2>AI Study Coach</h2>
            <p class="section-intro">Paste AI-generated JSON to create a study plan.</p>

            <details class="prompt-reference">
                <summary>Show prompt template</summary>
                <pre id="prompt-template">Loading prompt template...</pre>
                <button type="button" id="copy-prompt">Copy prompt</button>
            </details>

            <form id="coach-form">
                <label for="plan-input">Paste your JSON plan here</label>
                <textarea id="plan-input" rows="6" placeholder='{"planTitle":"My Plan", "topics": []}'></textarea>
                <div class="form-actions">
                    <button type="submit" id="parse-btn">Parse Plan</button>
                    <button type="button" id="clear-plan" class="secondary">Clear</button>
                </div>
                <p id="coach-error" class="error" role="alert"></p>
            </form>

            <div id="coach-output"></div>
        </section>
    </main>

</body>
</html>
